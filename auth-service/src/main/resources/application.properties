spring.application.name=auth-service

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/officespace_db
spring.datasource.username=officespace_user
spring.datasource.password=officespace_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

api.security.token.secret=officespace-secret-key-2026
api.security.token.issuer=officespace

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs