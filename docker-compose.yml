# docker-compose.yml (updated)
version: '3.8'

services:
  db:
    image: postgres:15
    container_name: officespace_db
    environment:
      POSTGRES_DB: officespace_db
      POSTGRES_USER: officespace_user
      POSTGRES_PASSWORD: officespace_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  catalog-service:
    build: ./catalog-service # Indica que construya la imagen desde el Dockerfile del subdirectorio
    container_name: catalog_service
    ports:
      # Expone el puerto del servicio
      - "8081:8081"
    depends_on:
      # Asegura que la DB esté levantada antes que este servicio
      - db
    environment:
      # Las propiedades de conexión a DB son las mismas que las de application.properties
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/officespace_db
      SPRING_DATASOURCE_USERNAME: officespace_user
      SPRING_DATASOURCE_PASSWORD: officespace_password
      # Igual que en application.properties
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Igual que en application.properties      
      SERVER_PORT: 8081

volumes:
  postgres_data: