services:
  accounts-db:
    image: postgres:15-alpine
    container_name: accounts_db
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - accounts_data:/var/lib/postgresql/data
      - ./accounts-service/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  processor-db:
    image: postgres:15-alpine
    container_name: processor_db
    environment:
      POSTGRES_DB: processor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - processor_data:/var/lib/postgresql/data
      - ./processor-service/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  accounts-service:
    build: ./accounts-service
    container_name: accounts_service
    ports:
      - "3000:3000"
    environment:
      DB_HOST: accounts-db
      DB_PORT: 5432
      DB_NAME: accounts_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    depends_on:
      accounts-db:
        condition: service_healthy

  processor-service:
    build: ./processor-service
    container_name: processor_service
    ports:
      - "3001:3001"
    environment:
      DB_HOST: processor-db
      DB_PORT: 5432
      DB_NAME: processor_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      ACCOUNTS_SERVICE_URL: http://accounts-service:3000
      PORT: 3001
    depends_on:
      processor-db:
        condition: service_healthy
      accounts-service:
        condition: service_started

volumes:
  accounts_data:
  processor_data:
