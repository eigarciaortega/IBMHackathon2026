services:
  postgres:
    image: postgres:15-alpine
    container_name: officespace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: officespace_db
      POSTGRES_USER: officespace_user
      POSTGRES_PASSWORD: officespace_pass
    ports:
      - "5432:5432"
    volumes:
      - officespace_postgres_data:/var/lib/postgresql/data
      - ./shared-infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U officespace_user -d officespace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  officespace_postgres_data:
