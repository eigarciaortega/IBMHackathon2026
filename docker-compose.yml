# Orquestación local (desarrollo): PostgreSQL + los tres microservicios Go + el
# frontend. Los servicios se comunican por la red interna usando los nombres de
# servicio como host; los puertos publicados son para acceso desde el equipo.
#
# Las URLs VITE_* del frontend apuntan a localhost porque las consume el navegador
# del usuario (fuera de la red de Docker). CATALOG_BASE_URL, en cambio, es interno
# (booking → catalog) y usa el nombre de servicio.

services:
  postgres:
    image: postgres:16-alpine
    container_name: officespace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Mexico_City}
      PGTZ: ${TZ:-America/Mexico_City}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Esquema, índices, restricción anti-solapamiento y semilla. Solo se ejecuta
      # cuando el volumen de datos está vacío (primer arranque).
      - ./shared-infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - officespace

  auth-service:
    build:
      context: ./auth-service
    container_name: officespace-auth
    restart: unless-stopped
    environment:
      PORT: "8081"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRA_HORAS: ${JWT_EXPIRA_HORAS:-8}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TZ: ${TZ:-America/Mexico_City}
    ports:
      - "${AUTH_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - officespace

  catalog-service:
    build:
      context: ./catalog-service
    container_name: officespace-catalog
    restart: unless-stopped
    environment:
      PORT: "8082"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TZ: ${TZ:-America/Mexico_City}
    ports:
      - "${CATALOG_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - officespace

  booking-service:
    build:
      context: ./booking-service
    container_name: officespace-booking
    restart: unless-stopped
    environment:
      PORT: "8083"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      # Comunicación interna booking → catalog por HTTP (nombre de servicio).
      CATALOG_BASE_URL: http://catalog-service:8082
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TZ: ${TZ:-America/Mexico_City}
    ports:
      - "${BOOKING_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    networks:
      - officespace

  frontend:
    build:
      context: ./frontend
      args:
        # URLs públicas (las usa el navegador, no la red interna de Docker).
        VITE_AUTH_URL: ${PUBLIC_AUTH_URL:-http://localhost:8081}
        VITE_CATALOG_URL: ${PUBLIC_CATALOG_URL:-http://localhost:8082}
        VITE_BOOKING_URL: ${PUBLIC_BOOKING_URL:-http://localhost:8083}
    container_name: officespace-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
    networks:
      - officespace

volumes:
  pgdata:

networks:
  officespace:
    driver: bridge
