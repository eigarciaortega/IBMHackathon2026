version: "3.9"

services:
  accounts-db:
    image: postgres:16-alpine
    container_name: neowallet-accounts-db
    environment:
      POSTGRES_USER: ${ACCOUNTS_DB_USER}
      POSTGRES_PASSWORD: ${ACCOUNTS_DB_PASSWORD}
      POSTGRES_DB: ${ACCOUNTS_DB_NAME}
    volumes:
      - accounts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACCOUNTS_DB_USER} -d ${ACCOUNTS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - neowallet-net

  processor-db:
    image: postgres:16-alpine
    container_name: neowallet-processor-db
    environment:
      POSTGRES_USER: ${PROCESSOR_DB_USER}
      POSTGRES_PASSWORD: ${PROCESSOR_DB_PASSWORD}
      POSTGRES_DB: ${PROCESSOR_DB_NAME}
    volumes:
      - processor-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROCESSOR_DB_USER} -d ${PROCESSOR_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - neowallet-net

  accounts-service:
    build:
      context: ./accounts-service
      dockerfile: Dockerfile
    container_name: neowallet-accounts-service
    environment:
      ACCOUNTS_DB_HOST: accounts-db
      ACCOUNTS_DB_PORT: "5432"
      ACCOUNTS_DB_USER: ${ACCOUNTS_DB_USER}
      ACCOUNTS_DB_PASSWORD: ${ACCOUNTS_DB_PASSWORD}
      ACCOUNTS_DB_NAME: ${ACCOUNTS_DB_NAME}
      ACCOUNTS_DB_SSLMODE: disable
      ACCOUNTS_SERVICE_PORT: "3000"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      accounts-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - neowallet-net

  processor-service:
    build:
      context: ./processor-service
      dockerfile: Dockerfile
    container_name: neowallet-processor-service
    environment:
      PROCESSOR_DB_HOST: processor-db
      PROCESSOR_DB_PORT: "5432"
      PROCESSOR_DB_USER: ${PROCESSOR_DB_USER}
      PROCESSOR_DB_PASSWORD: ${PROCESSOR_DB_PASSWORD}
      PROCESSOR_DB_NAME: ${PROCESSOR_DB_NAME}
      PROCESSOR_DB_SSLMODE: disable
      ACCOUNTS_SERVICE_URL: http://accounts-service:3000
      PROCESSOR_SERVICE_PORT: "3001"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      accounts-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - neowallet-net

volumes:
  accounts-data:
  processor-data:

networks:
  neowallet-net:
    driver: bridge