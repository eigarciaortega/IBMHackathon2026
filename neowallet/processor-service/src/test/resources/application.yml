spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

neowallet:
  security:
    jwt:
      secret: TestSecretKeyForJWTThatMustBe256BitsLongForTests!!
      expiration-ms: 86400000
    internal-api-key: internal-neowallet-key-2026
  services:
    accounts-url: http://localhost:9999

logging:
  level:
    com.neowallet: DEBUG
