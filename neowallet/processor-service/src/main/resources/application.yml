server:
  port: 8081

spring:
  application:
    name: processor-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:processor_db}
    username: ${DB_USER:neowallet}
    password: ${DB_PASS:neowallet123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

neowallet:
  security:
    jwt:
      secret: ${JWT_SECRET:NeoWalletSuperSecretKeyForJWT2026MustBe256BitsLong!!}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    internal-api-key: ${INTERNAL_API_KEY:internal-neowallet-key-2026}
  services:
    accounts-url: ${ACCOUNTS_SERVICE_URL:http://localhost:8080}

logging:
  level:
    com.neowallet: INFO
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"processor-service","message":"%msg"}%n'
