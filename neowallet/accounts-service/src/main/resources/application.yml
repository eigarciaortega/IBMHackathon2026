server:
  port: 8080

spring:
  application:
    name: accounts-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:accounts_db}
    username: ${DB_USER:neowallet}
    password: ${DB_PASS:neowallet123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

neowallet:
  security:
    jwt:
      secret: ${JWT_SECRET:NeoWalletSuperSecretKeyForJWT2026MustBe256BitsLong!!}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    internal-api-key: ${INTERNAL_API_KEY:internal-neowallet-key-2026}

logging:
  level:
    com.neowallet: INFO
    org.springframework.security: WARN
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"accounts-service","traceId":"%X{traceId}","message":"%msg"}%n'
