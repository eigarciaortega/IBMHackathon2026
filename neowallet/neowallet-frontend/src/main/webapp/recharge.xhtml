<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <ui:define name="title">Recargar Saldo</ui:define>

    <ui:define name="content">

        <div class="nw-page-header">
            <h2 class="nw-page-title">
                <i class="pi pi-plus-circle"></i> Recargar Saldo
            </h2>
        </div>

        <div class="nw-form-wrapper">
            <div class="nw-form-card">

                <div class="nw-form-card-header">
                    <i class="pi pi-credit-card"></i> Datos de recarga
                </div>

                <h:form id="rechargeForm">
                    <p:messages id="rechargeMsg" showDetail="true" closable="true"
                                style="margin-bottom:1rem;" />

                    <!-- Monto -->
                    <div class="nw-field">
                        <p:outputLabel for="amount" value="Monto a recargar (USD)" />
                        <p:inputNumber id="amount"
                                       value="#{rechargeBean.amount}"
                                       minValue="0.01"
                                       maxValue="50000.00"
                                       symbol="$ "
                                       symbolPosition="p"
                                       decimalSeparator="."
                                       thousandSeparator=","
                                       required="true"
                                       requiredMessage="El monto es requerido"
                                       styleClass="nw-input"
                                       placeholder="0.00" />
                        <small class="nw-hint">Máximo $50,000 por recarga</small>
                    </div>

                    <!-- Método de pago -->
                    <div class="nw-field">
                        <p:outputLabel for="paymentMethod" value="Método de pago" />
                        <p:selectOneMenu id="paymentMethod"
                                         value="#{rechargeBean.paymentMethod}"
                                         styleClass="nw-input">
                            <f:selectItem itemValue="CREDIT_CARD"   itemLabel="💳  Tarjeta de Crédito" />
                            <f:selectItem itemValue="DEBIT_CARD"    itemLabel="💳  Tarjeta de Débito" />
                            <f:selectItem itemValue="BANK_TRANSFER" itemLabel="🏦  Transferencia Bancaria" />
                        </p:selectOneMenu>
                    </div>

                    <!-- Botones -->
                    <div class="nw-btn-row">
                        <p:commandButton value="Recargar Saldo"
                                         icon="pi pi-check"
                                         action="#{rechargeBean.recharge()}"
                                         update="rechargeMsg rechargeResult"
                                         process="@form"
                                         styleClass="nw-btn-primary" />
                        <p:commandButton value="Limpiar"
                                         icon="pi pi-times"
                                         action="#{rechargeBean.reset()}"
                                         update="@form"
                                         process="@none"
                                         styleClass="p-button-outlined"
                                         immediate="true" />
                    </div>

                    <!-- Resultado de recarga -->
                    <p:outputPanel id="rechargeResult">
                        <div class="nw-result-box nw-result-success"
                             style="display:#{rechargeBean.rechargeSuccess ? 'block' : 'none'};">
                            <h3 class="nw-result-title">
                                <i class="pi pi-check-circle"></i> Recarga Exitosa
                            </h3>
                            <div class="nw-result-row">
                                <span>Saldo anterior:</span>
                                <span>$<h:outputText value="#{rechargeBean.lastRecharge.previousBalance}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText></span>
                            </div>
                            <div class="nw-result-row">
                                <span>Monto recargado:</span>
                                <span class="nw-positive">
                                    +$<h:outputText value="#{rechargeBean.lastRecharge.amount}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </span>
                            </div>
                            <div class="nw-result-row nw-result-total">
                                <span>Nuevo saldo:</span>
                                <span>$<h:outputText value="#{rechargeBean.lastRecharge.newBalance}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText></span>
                            </div>
                        </div>
                    </p:outputPanel>

                </h:form>
            </div>
        </div>

    </ui:define>
</ui:composition>
</html>
