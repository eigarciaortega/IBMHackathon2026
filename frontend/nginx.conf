server {
  listen 80;
  server_name _;

  # Health check para el docker-compose.
  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # SPA: cualquier ruta desconocida cae en index.html (routing del cliente).
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
