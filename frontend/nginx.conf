# nginx sirve la SPA y actúa de puerta de enlace: proxea /api/* a los servicios
# por la red interna de Docker. Así todo queda en el mismo origen (sin CORS) y el
# despliegue/túnel solo necesita exponer este contenedor.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Resolver de Docker: permite re-resolver la IP de los servicios si reinician.
    resolver 127.0.0.11 valid=30s;

    # --- Puerta de enlace de la API ---
    # Se captura el resto de la ruta ($1) y se reenvía al servicio correspondiente.
    # El host va en variable para forzar la resolución en tiempo de ejecución.
    location ~ ^/api/auth/(.*)$ {
        set $up_auth auth-service;
        proxy_pass http://$up_auth:8081/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/catalog/(.*)$ {
        set $up_catalog catalog-service;
        proxy_pass http://$up_catalog:8082/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Flujo SSE de notificaciones: debe ir ANTES de la regla general de booking
    # (las regex se evalúan en orden). Sin buffering ni timeout corto para que los
    # eventos lleguen al instante y la conexión se mantenga abierta.
    location ~ ^/api/booking/(notifications/stream.*)$ {
        set $up_booking_sse booking-service;
        proxy_pass http://$up_booking_sse:8083/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location ~ ^/api/booking/(.*)$ {
        set $up_booking booking-service;
        proxy_pass http://$up_booking:8083/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Activos con hash en el nombre: caché agresiva.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Enrutamiento del lado del cliente: cualquier ruta cae en index.html.
    # index.html se revalida siempre para que tras un nuevo build el navegador
    # tome los assets con hash nuevo (los de /assets/ sí son inmutables).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
