# Configuración de nginx para servir la SPA en producción.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión de los activos estáticos.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Activos con hash en el nombre: se pueden cachear de forma agresiva.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Enrutamiento del lado del cliente: cualquier ruta cae en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
