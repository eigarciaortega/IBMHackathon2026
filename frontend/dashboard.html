<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | OfficeSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .bg-card-soft { background-color: #F8F9FA; }
    </style>
</head>
<body class="bg-white font-sans text-gray-800 min-h-screen flex flex-col">

    <nav class="bg-[#4A4A4A] text-white py-4 px-8 flex justify-between items-center rounded-b-lg mx-2 mt-1">
        <div class="text-xl font-serif tracking-wider">OfficeSpace</div>
        <div class="flex items-center gap-6">
            <span id="userRoleBadge" class="text-xs uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full">Cargando...</span>
            <button onclick="logout()" class="text-sm font-medium hover:text-gray-300 transition">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="flex-grow p-8 max-w-6xl mx-auto w-full">
        
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-serif text-[#2C3E50] mb-2">Catálogo de Espacios</h1>
                <p class="text-gray-500">Explora y reserva las salas o escritorios disponibles.</p>
            </div>
            <button id="btnCreateSpace" class="hidden bg-[#4A4A4A] text-white px-6 py-2 rounded-full font-medium hover:bg-[#333333] transition">
                + Nuevo Espacio
            </button>
        </header>

        <div id="spacesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

    </main>

    <div id="bookingModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white w-full max-w-lg p-8 rounded-[2rem] shadow-2xl relative">
            
            <button onclick="closeBookingModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <h2 class="text-3xl font-serif text-[#2C3E50] mb-1">Reservar espacio</h2>
            <p class="text-sm text-gray-500 mb-6">
                Espacio: <span id="modalSpaceName" class="font-bold text-gray-700"></span><br>
                Capacidad máxima: <span id="modalCapacity" class="font-bold text-gray-700"></span> asistentes
            </p>

            <form id="bookingForm" class="space-y-5">
                <input type="hidden" id="modalSpaceId">
                
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Fecha de la reserva</label>
                    <input type="date" id="bookingDate" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                </div>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">Hora Inicio</label>
                        <input type="time" id="startTime" required 
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">Hora Fin</label>
                        <input type="time" id="endTime" required 
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1">Número de Asistentes</label>
                    <input type="number" id="attendees" min="1" required placeholder="Ej. 3"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                </div>

                <div id="bookingError" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-xl border border-red-100"></div>
                <div id="bookingSuccess" class="hidden bg-green-50 text-green-600 text-sm p-3 rounded-xl border border-green-100">
                    ¡Reserva confirmada exitosamente!
                </div>

                <button type="submit" 
                        class="w-full bg-[#4A4A4A] text-white py-3.5 rounded-full font-medium hover:bg-[#333333] transition mt-2">
                    Confirmar Reserva
                </button>
            </form>
        </div>
    </div>

    <div id="createSpaceModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white w-full max-w-lg p-8 rounded-[2rem] shadow-2xl relative">
            
            <button onclick="closeCreateSpaceModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <h2 class="text-3xl font-serif text-[#2C3E50] mb-6">Nuevo Espacio</h2>

            <form id="createSpaceForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Nombre del Espacio</label>
                    <input type="text" id="spaceName" required placeholder="Ej. Sala de Innovación"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                </div>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">Tipo</label>
                        <select id="spaceType" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                            <option value="SALA">Sala</option>
                            <option value="ESCRITORIO">Escritorio</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">Capacidad</label>
                        <input type="number" id="spaceCapacity" min="1" required placeholder="Ej. 10"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1">Ubicación</label>
                    <input type="text" id="spaceLocation" required placeholder="Ej. Piso 5, Torre A"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1">Recursos (separados por coma)</label>
                    <input type="text" id="spaceResources" required placeholder="Pantalla 4K, Pizarra, A/C"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 bg-gray-50">
                </div>

                <div id="createSpaceError" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-xl border border-red-100"></div>

                <button type="submit" 
                        class="w-full bg-[#4A4A4A] text-white py-3.5 rounded-full font-medium hover:bg-[#333333] transition mt-4">
                    Guardar Espacio
                </button>
            </form>
        </div>
    </div>

    <script>
        // 1. Verificación de Seguridad del Frontend
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        if (!token) {
            // Si alguien intenta entrar a dashboard.html sin loguearse, lo pateamos al index
            window.location.href = 'index.html';
        }

        // 2. Configurar la interfaz según el rol
        document.getElementById('userRoleBadge').innerText = role;
        if (role === 'ADMINISTRADOR') {
            document.getElementById('btnCreateSpace').classList.remove('hidden');
            // AGREGAR ESTA LÍNEA PARA ABRIR EL MODAL:
            document.getElementById('btnCreateSpace').addEventListener('click', openCreateSpaceModal);
        }
        

        // 3. Función para traer los espacios del catalog-service
        async function loadSpaces() {
            try {
                // Hacemos GET al catalog-service enviando nuestro Token en los Headers
                const response = await fetch('http://localhost:8081/api/spaces', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const spaces = await response.json();
                    renderSpaces(spaces);
                } else if (response.status === 401) {
                    alert('Tu sesión ha expirado');
                    logout();
                }
            } catch (error) {
                console.error("Error cargando espacios:", error);
                document.getElementById('spacesGrid').innerHTML = '<p class="text-red-500">Error conectando con el servidor de catálogo.</p>';
            }
        }

        // 4. Función para dibujar las tarjetas con el estilo elegante
        function renderSpaces(spaces) {
            const grid = document.getElementById('spacesGrid');
            grid.innerHTML = '';

            spaces.forEach(space => {
                const card = `
                    <div class="bg-card-soft p-6 rounded-3xl border border-gray-100 flex flex-col h-full">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase">${space.type}</span>
                            <span class="text-sm text-gray-500">Capacidad: ${space.capacity}</span>
                        </div>
                        <h3 class="text-2xl font-serif text-[#2C3E50] mb-2">${space.name}</h3>
                        <p class="text-sm text-gray-600 mb-1">📍 ${space.location}</p>
                        <p class="text-sm text-gray-500 mb-6 flex-grow">🛠️ ${space.resources}</p>
                        
                        <button onclick="openBookingModal(${space.id}, '${space.name}', ${space.capacity})" 
                                class="w-full border-2 border-[#4A4A4A] text-[#4A4A4A] py-2 rounded-full font-medium hover:bg-[#4A4A4A] hover:text-white transition">
                            Reservar Espacio
                        </button>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // 5. Cerrar Sesión
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // 6. Funciones del Modal de Reserva
        function openBookingModal(spaceId, spaceName, capacity) {
            // Llenamos los datos visuales y ocultos
            document.getElementById('modalSpaceId').value = spaceId;
            document.getElementById('modalSpaceName').innerText = spaceName;
            document.getElementById('modalCapacity').innerText = capacity;
            
            // Limitamos dinámicamente el input de asistentes
            document.getElementById('attendees').max = capacity;
            
            // Limpiamos formularios y alertas viejas
            document.getElementById('bookingForm').reset();
            document.getElementById('bookingError').classList.add('hidden');
            document.getElementById('bookingSuccess').classList.add('hidden');
            
            // Mostramos el modal
            document.getElementById('bookingModal').classList.remove('hidden');
        }

        function closeBookingModal() {
            document.getElementById('bookingModal').classList.add('hidden');
        }

        // 7. Enviar la reserva al Backend
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('bookingError');
            const successDiv = document.getElementById('bookingSuccess');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            // Formatear las horas agregando ":00" para los segundos que espera Java
            let start = document.getElementById('startTime').value;
            let end = document.getElementById('endTime').value;
            if(start.length === 5) start += ":00";
            if(end.length === 5) end += ":00";

            const payload = {
                spaceId: parseInt(document.getElementById('modalSpaceId').value),
                userId: parseInt(localStorage.getItem('userId')), // Sacamos el ID del storage
                bookingDate: document.getElementById('bookingDate').value,
                startTime: start,
                endTime: end,
                attendees: parseInt(document.getElementById('attendees').value)
            };

            try {
                // Petición al booking-service (Puerto 8082)
                const response = await fetch('http://localhost:8082/api/bookings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // Enviamos el pasaporte
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    successDiv.classList.remove('hidden');
                    setTimeout(() => { closeBookingModal(); }, 2000); // Cierra automáticamente en 2 segundos
                } else {
                    // Si Java arrojó un error (ej. Solapamiento o Fecha pasada)
                    const errorMessage = await response.text();
                    errorDiv.innerText = errorMessage;
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error al reservar:", error);
                errorDiv.innerText = "Error de red al intentar conectar con el servidor.";
                errorDiv.classList.remove('hidden');
            }
        });

        // 8. Funciones del Modal de Nuevo Espacio
        function openCreateSpaceModal() {
            document.getElementById('createSpaceForm').reset();
            document.getElementById('createSpaceError').classList.add('hidden');
            document.getElementById('createSpaceModal').classList.remove('hidden');
        }

        function closeCreateSpaceModal() {
            document.getElementById('createSpaceModal').classList.add('hidden');
        }

        document.getElementById('createSpaceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('createSpaceError');
            errorDiv.classList.add('hidden');

            const payload = {
                name: document.getElementById('spaceName').value,
                type: document.getElementById('spaceType').value,
                capacity: parseInt(document.getElementById('spaceCapacity').value),
                location: document.getElementById('spaceLocation').value,
                resources: document.getElementById('spaceResources').value
            };

            try {
                // Petición al catalog-service (Puerto 8081)
                const response = await fetch('http://localhost:8081/api/spaces', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // El pasaporte de Admin
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    closeCreateSpaceModal();
                    loadSpaces(); // Recarga las tarjetas para mostrar el nuevo espacio
                } else {
                    errorDiv.innerText = "Error al crear el espacio. Verifica tus permisos.";
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error creando espacio:", error);
                errorDiv.innerText = "Error de conexión con el servidor.";
                errorDiv.classList.remove('hidden');
            }
        });

        // Arrancar la carga al iniciar
        loadSpaces();
    </script>
</body>
</html>
