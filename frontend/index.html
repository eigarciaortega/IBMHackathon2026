<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OfficeSpace — gestión híbrida de salas y escritorios de Corporativo Alpha." />
    <meta name="theme-color" content="#eef1f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1320" media="(prefers-color-scheme: dark)" />
    <title>OfficeSpace — Gestión de espacios</title>
    <!-- Aplica el tema antes de pintar para evitar el parpadeo (FOUC).
         Claro por defecto: solo se activa oscuro si el usuario lo eligió antes. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('officespace_tema') === 'oscuro') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
