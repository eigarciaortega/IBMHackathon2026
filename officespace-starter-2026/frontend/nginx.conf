server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Sirve index.html para cualquier ruta no encontrada (SPA friendly)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets
    location ~* \.(css|js|png|jpg|ico)$ {
        expires 1d;
    }
}
