<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeSpace</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>OfficeSpace</h1>
      <div class="login-divider"></div>
      <p>Sistema de Gestion de Espacios Hibridos</p>
    </div>

    <div class="form-group">
      <label for="email">Correo electronico</label>
      <input type="email" id="email" placeholder="correo@corporativoalpha.com" autofocus>
    </div>

    <div class="form-group">
      <label for="password">Contrasena</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary btn-block" id="btn-login" onclick="doLogin()">
      Iniciar Sesion
    </button>

    <div id="alert-login" class="alert"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  if (Auth.token()) {
    window.location.href = Auth.isAdmin() ? 'pages/admin.html' : 'pages/search.html';
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');

    if (!email || !password) {
      showAlert('alert-login', 'Por favor ingresa tu correo y contrasena.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verificando...';

    try {
      const res  = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert('alert-login', data.error || 'Credenciales invalidas.', 'error');
        return;
      }

      Auth.save(data.token, data.usuario);

      if (data.usuario.rol === 'ADMINISTRADOR') {
        window.location.href = 'pages/admin.html';
      } else {
        window.location.href = 'pages/search.html';
      }

    } catch (err) {
      showAlert('alert-login', 'No se pudo conectar con el servidor.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Iniciar Sesion';
    }
  }
</script>
</body>
</html>
