<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeSpace — Buscar Espacios</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<main class="page">
  <h2 class="page-title">Buscar Espacios</h2>

  <div class="card" style="margin-bottom:20px;">
    <div class="filters">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="form-group">
        <label>Hora Inicio</label>
        <input type="time" id="f-inicio" value="09:00">
      </div>
      <div class="form-group">
        <label>Hora Fin</label>
        <input type="time" id="f-fin" value="11:00">
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select id="f-tipo">
          <option value="">Todos</option>
          <option value="SALA">Sala de juntas</option>
          <option value="DESK">Escritorio</option>
        </select>
      </div>
      <div class="form-group">
        <label>Capacidad minima</label>
        <input type="number" id="f-capacidad" min="1" placeholder="Ej: 4">
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <button class="btn btn-primary" onclick="buscar()">Buscar</button>
      </div>
    </div>
  </div>

  <div id="alert-search" class="alert"></div>

  <div id="resultados">
    <div class="empty">
      <div class="empty-icon">—</div>
      <p>Selecciona una fecha y hora para ver los espacios disponibles.</p>
    </div>
  </div>
</main>

<!-- Modal -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;">
  <div class="card" style="width:100%;max-width:480px;margin:20px;border-top:3px solid var(--red);">
    <h3 style="margin-bottom:16px;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;">Confirmar Reserva</h3>
    <div class="confirm-box" id="confirm-summary"></div>
    <div class="form-group">
      <label>Numero de asistentes</label>
      <input type="number" id="asistentes" min="1" placeholder="Cantidad de personas">
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-success" style="flex:1" onclick="confirmarReserva()">Confirmar</button>
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
    </div>
    <div id="alert-modal" class="alert"></div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  let espacioSeleccionado = null;

  document.addEventListener('DOMContentLoaded', () => {
    if (!Auth.requireLogin()) return;
    renderNavbar('search');
    iniciarNotificaciones();
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('f-fecha').value = hoy;
    document.getElementById('f-fecha').min = hoy;
  });

  async function buscar() {
    const fecha  = document.getElementById('f-fecha').value;
    const inicio = document.getElementById('f-inicio').value;
    const fin    = document.getElementById('f-fin').value;
    const tipo   = document.getElementById('f-tipo').value;
    const capMin = document.getElementById('f-capacidad').value;

    if (!fecha) { showAlert('alert-search', 'Selecciona una fecha.', 'error'); return; }
    if (!inicio || !fin) { showAlert('alert-search', 'Ingresa hora de inicio y fin.', 'error'); return; }
    if (fin <= inicio) { showAlert('alert-search', 'La hora de fin debe ser mayor que la de inicio.', 'error'); return; }

    const contenedor = document.getElementById('resultados');
    contenedor.innerHTML = '<div class="skeleton" style="height:120px;margin-bottom:12px;"></div>'.repeat(3);

    try {
      let qs = '?';
      if (tipo) qs += `tipo=${tipo}&`;
      if (capMin) qs += `capacidad_min=${capMin}&`;

      const resEspacios = await apiFetch(`/spaces${qs}`);
      if (!resEspacios) return;
      const espacios = await resEspacios.json();

      if (espacios.length === 0) {
        contenedor.innerHTML = '<div class="empty"><div class="empty-icon">—</div><p>No hay espacios con esos filtros.</p></div>';
        return;
      }

      contenedor.innerHTML = `<p style="color:var(--gray);margin-bottom:16px;font-size:.8rem;letter-spacing:.5px;">${espacios.length} espacio(s) encontrado(s)</p>`;
      const grid = document.createElement('div');
      grid.className = 'spaces-grid';

      espacios.forEach(e => {
        const card = document.createElement('div');
        card.className = 'space-card';
        card.innerHTML = `
          <div class="space-card-header">
            <span class="space-card-name">${e.nombre}</span>
            <span class="badge ${e.tipo === 'SALA' ? 'badge-sala' : 'badge-desk'}">${e.tipo}</span>
          </div>
          <div class="space-card-meta">
            Capacidad: <strong style="color:var(--white)">${e.capacidad} personas</strong><br>
            Ubicacion: ${e.piso}<br>
            Recursos: ${e.recursos || 'Sin recursos adicionales'}
          </div>
          <div class="space-card-footer">
            <span style="font-size:.75rem;color:var(--gray);letter-spacing:1px;">ID ${e.id}</span>
            <button class="btn btn-primary btn-sm" onclick='abrirModal(${JSON.stringify(e)})'>Reservar</button>
          </div>
        `;
        grid.appendChild(card);
      });

      contenedor.appendChild(grid);
    } catch (err) {
      contenedor.innerHTML = '';
      showAlert('alert-search', 'Error al conectar con el servidor.', 'error');
    }
  }

  function abrirModal(espacio) {
    espacioSeleccionado = espacio;
    const fecha  = document.getElementById('f-fecha').value;
    const inicio = document.getElementById('f-inicio').value;
    const fin    = document.getElementById('f-fin').value;

    document.getElementById('confirm-summary').innerHTML = `
      <h3>Resumen de Reserva</h3>
      <div class="confirm-row"><span>Espacio</span><span>${espacio.nombre}</span></div>
      <div class="confirm-row"><span>Tipo</span><span>${espacio.tipo}</span></div>
      <div class="confirm-row"><span>Ubicacion</span><span>${espacio.piso}</span></div>
      <div class="confirm-row"><span>Capacidad maxima</span><span>${espacio.capacidad} personas</span></div>
      <div class="confirm-row"><span>Fecha</span><span>${fmtDate(fecha)}</span></div>
      <div class="confirm-row"><span>Horario</span><span>${inicio} — ${fin}</span></div>
    `;

    document.getElementById('asistentes').value = '';
    document.getElementById('asistentes').max = espacio.capacidad;
    document.getElementById('alert-modal').className = 'alert';

    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
  }

  function cerrarModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    espacioSeleccionado = null;
  }

  async function confirmarReserva() {
    const asistentes = parseInt(document.getElementById('asistentes').value);
    const fecha      = document.getElementById('f-fecha').value;
    const inicio     = document.getElementById('f-inicio').value;
    const fin        = document.getElementById('f-fin').value;

    if (!asistentes || asistentes < 1) {
      showAlert('alert-modal', 'Ingresa el numero de asistentes.', 'error'); return;
    }
    if (asistentes > espacioSeleccionado.capacidad) {
      showAlert('alert-modal', `Maximo ${espacioSeleccionado.capacidad} personas para este espacio.`, 'error'); return;
    }

    const btn = document.querySelector('#modal-overlay .btn-success');
    btn.disabled = true;
    btn.textContent = 'Procesando...';

    try {
      const res = await apiFetch('/bookings', {
        method: 'POST',
        body: JSON.stringify({ space_id: espacioSeleccionado.id, fecha, hora_inicio: inicio, hora_fin: fin, asistentes })
      });
      const data = await res.json();

      if (res.status === 201) {
        cerrarModal();
        sessionStorage.setItem('ultima_reserva', JSON.stringify({
          ...data.reserva,
          espacio_nombre: espacioSeleccionado.nombre,
          piso: espacioSeleccionado.piso
        }));
        window.location.href = 'confirm.html';
      } else {
        showAlert('alert-modal', data.error || 'Error al crear la reserva.', 'error');
      }
    } catch (err) {
      showAlert('alert-modal', 'Error de conexion.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Confirmar';
    }
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) cerrarModal();
  });
</script>
</body>
</html>
