<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeSpace — Historial de Reservas</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<main class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
    <h2 class="page-title" style="margin-bottom:0;">Historial de Reservas</h2>
    <div style="display:flex;gap:10px;">
      <a href="admin.html" class="btn btn-secondary">Volver al Panel</a>
      <button class="btn btn-primary" onclick="exportarCSV()">Exportar CSV</button>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px;">
    <div class="filters">
      <div class="form-group"><label>Desde</label><input type="date" id="f-desde"></div>
      <div class="form-group"><label>Hasta</label><input type="date" id="f-hasta"></div>
      <div class="form-group">
        <label>Espacio</label>
        <select id="f-espacio"><option value="">Todos los espacios</option></select>
      </div>
      <div class="form-group" style="justify-content:flex-end;gap:6px;">
        <button class="btn btn-primary" onclick="cargarHistorial()">Filtrar</button>
        <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
      </div>
    </div>
  </div>

  <div id="alert-hist" class="alert"></div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray);">Todas las Reservas</h3>
      <span id="total-tag" class="tag-total">0 registros</span>
    </div>
    <div id="tabla-historial">
      <div class="empty"><div class="empty-icon">—</div><p>Aplica un filtro o carga todas las reservas.</p></div>
    </div>
  </div>
</main>

<script src="../js/app.js"></script>
<script>
  let historialData = [];

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.requireLogin()) return;
    if (!Auth.isAdmin()) { alert('Acceso restringido.'); window.location.href = 'search.html'; return; }
    renderNavbar('admin');
    iniciarNotificaciones();
    await cargarEspaciosSelect();
    await cargarHistorial();
  });

  async function cargarEspaciosSelect() {
    try {
      const res = await apiFetch('/spaces');
      const espacios = await res.json();
      const sel = document.getElementById('f-espacio');
      espacios.forEach(e => { sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`; });
    } catch (e) {}
  }

  async function cargarHistorial() {
    const desde   = document.getElementById('f-desde').value;
    const hasta   = document.getElementById('f-hasta').value;
    const spaceId = document.getElementById('f-espacio').value;

    const contenedor = document.getElementById('tabla-historial');
    contenedor.innerHTML = '<div class="skeleton" style="height:60px;margin-bottom:8px;"></div>'.repeat(5);

    let qs = '?';
    if (desde)   qs += `fecha_inicio=${desde}&`;
    if (hasta)   qs += `fecha_fin=${hasta}&`;
    if (spaceId) qs += `space_id=${spaceId}&`;

    try {
      const res  = await apiFetch(`/bookings/historial${qs}`);
      if (!res) return;
      const data = await res.json();
      historialData = data.reservas;

      document.getElementById('total-tag').textContent = `${data.total} registro(s)`;

      if (data.reservas.length === 0) {
        contenedor.innerHTML = '<div class="empty"><div class="empty-icon">—</div><p>No hay reservas con esos filtros.</p></div>';
        return;
      }

      renderTabla(data.reservas);
    } catch (err) {
      contenedor.innerHTML = '';
      showAlert('alert-hist', 'Error al cargar el historial.', 'error');
    }
  }

  function renderTabla(reservas) {
    const hoy = new Date().toISOString().split('T')[0];
const filas = reservas.map(r => {
  const esPasada = (r.fecha || '').split('T')[0] < hoy;
      return `
        <tr>
          <td><strong>#${String(r.id).padStart(5,'0')}</strong></td>
          <td>${r.espacio_nombre}</td>
          <td><span class="badge ${r.tipo==='SALA'?'badge-sala':'badge-desk'}">${r.tipo}</span></td>
          <td>${fmtDate(r.fecha)}</td>
          <td>${fmtTime(r.hora_inicio)} — ${fmtTime(r.hora_fin)}</td>
          <td>${r.asistentes}</td>
          <td style="font-size:.78rem;color:var(--gray);">${r.usuario_email}</td>
          <td><span class="badge ${r.usuario_rol==='ADMINISTRADOR'?'badge-admin':'badge-colab'}">${r.usuario_rol}</span></td>
          <td>${r.piso}</td>
          <td>
            ${esPasada
              ? `<span style="color:var(--gray);font-size:.75rem;letter-spacing:.5px;">Finalizada</span>`
              : `<button class="btn btn-danger btn-sm" onclick="cancelarDesdeHistorial(${r.id})">Cancelar</button>`}
          </td>
        </tr>`;
    }).join('');

    document.getElementById('tabla-historial').innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Folio</th><th>Espacio</th><th>Tipo</th><th>Fecha</th><th>Horario</th><th>Asist.</th><th>Usuario</th><th>Rol</th><th>Piso</th><th>Accion</th></tr></thead>
        <tbody>${filas}</tbody>
      </table></div>`;
  }

  async function cancelarDesdeHistorial(id) {
    if (!confirm(`Cancelar reserva #${id}?`)) return;
    try {
      const res  = await apiFetch(`/bookings/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (res.ok) { showAlert('alert-hist', 'Reserva cancelada.', 'success'); await cargarHistorial(); }
      else { showAlert('alert-hist', data.error || 'Error al cancelar.', 'error'); }
    } catch (e) { showAlert('alert-hist', 'Error de conexion.', 'error'); }
  }

  function limpiarFiltros() {
    document.getElementById('f-desde').value = '';
    document.getElementById('f-hasta').value = '';
    document.getElementById('f-espacio').value = '';
    cargarHistorial();
  }

  function exportarCSV() {
    if (!historialData.length) { showAlert('alert-hist', 'No hay datos para exportar.', 'warning'); return; }
    const cab  = ['Folio','Espacio','Tipo','Fecha','Hora Inicio','Hora Fin','Asistentes','Usuario','Rol','Piso'];
    const filas = historialData.map(r => [
      `#${String(r.id).padStart(5,'0')}`, r.espacio_nombre, r.tipo,
      r.fecha ? r.fecha.split('T')[0] : '',
      fmtTime(r.hora_inicio), fmtTime(r.hora_fin),
      r.asistentes, r.usuario_email, r.usuario_rol, r.piso
    ]);
    const csv  = [cab, ...filas].map(f => f.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `historial-${new Date().toISOString().split('T')[0]}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
