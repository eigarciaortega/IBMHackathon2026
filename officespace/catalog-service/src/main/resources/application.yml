server:
  port: 8082

spring:
  application:
    name: catalog-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/officespace}

app:
  jwt:
    secret: ${JWT_SECRET:officespace-mvp-jwt-secret-key-2026-corporativo-alpha-minimum-256-bits!!}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.corporativoalpha: DEBUG
