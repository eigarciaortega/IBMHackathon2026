services:

  postgres:
    image: postgres:16-alpine
    container_name: officeSpace-db
    environment:
      POSTGRES_DB: officeSpace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_db_password_here}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d officeSpace"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./authService
    container_name: auth-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/officeSpace
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-your_db_password_here}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_min_256_bits_here}
    depends_on:
      postgres:
        condition: service_healthy

  catalog-service:
    build: ./catalogService
    container_name: catalog-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/officeSpace
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-your_db_password_here}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_min_256_bits_here}
    depends_on:
      postgres:
        condition: service_healthy

  booking-service:
    build: ./bookingService
    container_name: booking-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/officeSpace
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-your_db_password_here}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_min_256_bits_here}
      CATALOG_SERVICE_URL: http://catalog-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started

volumes:
  postgres_data:
